<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站 AI 收藏夹整理</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 标题栏 -->
    <div class="header">
      <span>🤖 AI 收藏夹整理</span>
    </div>

    <!-- 配置区域 -->
    <div class="section">
      <h3>⚙️ API 配置</h3>
      <div class="form-group">
        <label for="apiKey">DeepSeek API Key</label>
        <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
      </div>
      <div class="form-group">
        <label for="apiUrl">API 地址</label>
        <input type="text" id="apiUrl" value="https://api.deepseek.com/v1/chat/completions">
      </div>
      <div class="form-group">
        <label for="model">模型</label>
        <select id="model">
          <option value="deepseek-chat">deepseek-chat</option>
          <option value="deepseek-coder">deepseek-coder</option>
        </select>
      </div>
      <button id="saveConfigBtn" class="btn-secondary">保存配置</button>
      <span id="saveStatus" class="save-status"></span>
    </div>

    <!-- 模式选择 -->
    <div class="section">
      <h3>📋 整理模式</h3>
      <div class="mode-options">
        <label class="mode-option">
          <input type="radio" name="mode" value="move" checked>
          <span class="mode-label">🚚 移动模式</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="mode" value="copy">
          <span class="mode-label">📋 复制模式</span>
        </label>
      </div>
      <p id="modeDesc" class="mode-desc">移动模式：视频从当前收藏夹移入目标分类，每个视频只归入一个收藏夹</p>
    </div>

    <!-- 高级设置 -->
    <div class="section">
      <h3>🔧 高级设置</h3>
      <div class="form-row">
        <div class="form-group half">
          <label for="batchSize">每批处理数量</label>
          <input type="number" id="batchSize" value="200" min="1" max="500">
        </div>
        <div class="form-group half">
          <label for="maxRetries">最大重试次数</label>
          <input type="number" id="maxRetries" value="3" min="1" max="10">
        </div>
      </div>
    </div>

    <!-- 特殊要求 -->
    <div class="section">
      <h3>⭐ 特殊要求（选填）</h3>
      <textarea id="customPrompt" placeholder="例如：
- 把所有 Vue 相关的放一个文件夹
- 把时长超过1小时的单独拎出来
(不填则优先放入已有收藏夹，并由 AI 自由发挥补充分类)"></textarea>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
      <button id="startBtn" class="btn-primary">🚀 开始深度整理</button>
    </div>

    <!-- 使用说明 -->
    <div class="section help">
      <h3>📖 使用说明</h3>
      <ol>
        <li>首先在「API 配置」中填入有效的 DeepSeek API Key</li>
        <li>确保你已经登录 B 站并进入某个收藏夹页面</li>
        <li>选择整理模式，填写特殊要求（可选）</li>
        <li>点击「开始深度整理」按钮</li>
        <li>整理过程中请勿关闭页面</li>
      </ol>
      <p class="warning">⚠️ 首次使用请先保存配置！</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
